name: overwolf-status-snapshot

on:
  schedule:
    # Every 5 minutes. GitHub may delay/skip scheduled runs under load — that's
    # fine here since Overwolf's own data has a ~5-10 min server delay anyway.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize runs so two snapshots never race on the same day file / git push.
concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Record snapshot
        run: node scripts/snapshot.mjs
      - name: Commit if changed
        run: |
          git config user.name "overwolf-status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "snapshot $(date -u +%FT%TZ)"
            git push
          fi
